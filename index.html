<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <header>
        <h1>ALGOGAMES</h1>
    </header>
    <main>
        <div class = "container-start">
            <p>WELCOME TO</p>
            <h1>REACTION TIME</h1>
            <div class = "left">
                <img src = "reactiontime.png" width = "190px" height = "190px">
                <div class = "start-btn">
                    <p>START</p>
                </div>
            </div>
            <div class = "right">
                <h2>SEE HOW FAST YOUR REFLEXES ARE</h2>
                <h2>THERE'S ONLY ONE RULE:</h2>
                <ol>
                    <li>MOVE THE CURSOR TO THE BOX WHEN IT FLASHES RED</li>
                </ol>
            </div>
        </div>
        <div class = "container-main">
            <div class = "block"></div>
        </div>
    </main>
    <script>
        let block = document.querySelector(".block")
    
        function moveBlock() {
            // ubah warna jadi merah dulu
            block.style.backgroundColor = "red"
    
            // posisi random
            let x = Math.random() * 500
            let y = Math.random() * 300
    
            block.style.marginLeft = x + "px"
            block.style.marginTop = y + "px"
    
            // setelah 1 detik berubah jadi hijau
            setTimeout(function() {
                block.style.backgroundColor = "green"
            }, 1000)
        }
    
        // saat kotak diklik
        block.addEventListener("click", function() {
    
            // hanya bisa diklik kalau hijau
            if(block.style.backgroundColor == "green") {
                moveBlock()
            }
        })
        // mulai pertama kali
        moveBlock()
    </script>
</body>
</html>
