<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <header>
        <h1>ALGOGAMES</h1>
    </header>
    <main>
        <div class = "container-start">
            <div class = "title">
                <p>WELCOME TO</p>
                <h1>REACTION TIME</h1>
            </div>
            <div class = "left">
                <img src = "reactiontime.png" width = "190px" height = "190px">
                <div class = "start-btn">
                    <p>START</p>
                </div>
            </div>
            <div class = "right">
                <h2>SEE HOW FAST YOUR REFLEXES ARE</h2>
                <h2>THERE'S ONLY ONE RULE:</h2>
                <ol>
                    <li>MOVE THE CURSOR TO THE BOX WHEN IT FLASHES RED</li>
                </ol>
            </div>
        </div>
        <div class = "container-main">
            <div class = "block"></div>
        </div>
    </main>
    <script>
        let block = document.querySelector(".block")
        block.style.display = 'none
    
        function moveBlock() {
            block.style.backgroundColor = "red"
    
            
            let x = Math.random() * 500
            let y = Math.random() * 300
    
            block.style.marginLeft = x + "px"
            block.style.marginTop = y + "px"
    
            setTimeout(function() {
                block.style.backgroundColor = "green"
            }, 1000)
        }
    
        block.addEventListener("click", function() {
    
            if(block.style.backgroundColor == "green") {
                moveBlock()
            }
        })

        let button = document.querySelector(".start-btn")
        let start = document.querySelector(".container-start")
        let main = document.querySelector(".container-main")

        button.addEventListener('click', function(){
            main.style.display = 'flex'
            block.style.display = 'flex'
            start.style.display = 'none'
            
            moveBlock()
        })
    </script>
</body>
</html>
